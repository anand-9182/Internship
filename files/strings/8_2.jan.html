<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1 id="d">count:0</h1>
    <button onclick="inc()">increment</button>
    <button onclick="dec()">decrement</button>
    <script>
        var i=0;
        function inc() {
            i++
            document.getElementById("d").innerText = "count:"+i;
        }
        function dec() {
            i--
            document.getElementById("d").innerText = "count:"+i;
        }
    </script>
</body>

</html>
