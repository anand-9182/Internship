<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table id="d1" border="2">
        <thead>
            <tr>
                <th onclick="sorting('firstname')">firstname</th>
                <th onclick="sorting('lastname')">lastname</th>
                <th onclick="sorting('age')">age</th>
                <th onclick="sorting('gender')">gender</th>
                <th onclick="sorting('city')">city</th>
                <th onclick="sorting('salary')">salary</th>
            </tr>
        </thead>
        <tbody id="ab">

        </tbody>
    </table>
    <script>
         const employees = [
            {
                firstname: "John",
                lastname: "Doe",
                age: 30,
                gender: "Male",
                city: "New York",
                salary: 60000
            },
            {
                firstname: "Jane",
                lastname: "Smith",
                age: 25,
                gender: "Female",
                city: "Los Angeles",
                salary: 75000
            },
            {
                firstname: "Peter",
                lastname: "Jones",
                age: 35,
                gender: "Male",
                city: "Chicago",
                salary: 80000
            },
            {
                firstname: "Alice",
                lastname: "Williams",
                age: 28,
                gender: "Female",
                city: "Houston",
                salary: 70000
            },
            {
                firstname: "Bob",
                lastname: "Brown",
                age: 40,
                gender: "Male",
                city: "Dallas",
                salary: 90000
            },
            {
                firstname: "Charlie",
                lastname: "Davis",
                age: 32,
                gender: "Male",
                city: "Miami",
                salary: 65000
            },
            {
                firstname: "Diana",
                lastname: "Miller",
                age: 29,
                gender: "Female",
                city: "Seattle",
                salary: 82000
            },
            {
                firstname: "Eve",
                lastname: "Wilson",
                age: 31,
                gender: "Female",
                city: "Boston",
                salary: 78000
            }
        ];
        var cnt=0;
        function gen(employees){
            document.getElementById("ab").innerHTML=""
        employees.forEach(function(a){
            var rows=document.createElement("tr")
                    var ftd=document.createElement("td")
                    ftd.innerText=a.firstname
                    rows.appendChild(ftd)
                    document.getElementById("ab").appendChild(rows)

                     var ltd=document.createElement("td")
                    ltd.innerText=a.lastname
                    rows.appendChild(ltd)
                    document.getElementById("ab").appendChild(rows)

                     var agetd=document.createElement("td")
                    agetd.innerText=a.age
                    rows.appendChild(agetd)
                    document.getElementById("ab").appendChild(rows)

                    var gendertd=document.createElement("td")
                    gendertd.innerText=a.gender
                    rows.appendChild(gendertd)
                    document.getElementById("ab").appendChild(rows)

                    var citytd=document.createElement("td")
                    citytd.innerText=a.city
                    rows.appendChild(citytd)
                    document.getElementById("ab").appendChild(rows)

                    var salarytd=document.createElement("td")
                    salarytd.innerText=a.salary
                    rows.appendChild(salarytd)
                    document.getElementById("ab").appendChild(rows)

                })
            }
                function sorting(n){
                    cnt++
                    emp=employees.slice()
                    if(cnt%2==0){
                        emp.sort(function(a,b){
                       
                       if(a[n]>b[n]){
                           return -1
                       }
                       else{
                           return 1
    
                       }
                   })

                    }
                    else{
                        emp.sort(function(a,b){
                       
                       if(a[n]>b[n]){
                           return 1
                       }
                       else{
                           return -1
    
                       }
                   })

                    }
                   gen(emp)
                }   
    </script>
</body>
</html>
