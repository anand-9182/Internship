<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .imgwid {
            width: 400px;
            height: 400px;
        }

        body {
            display: flex;
            align-items: center;
            flex-direction: row;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            height: 50px;
            width: 50px;
            font-size: 30px;
            border: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <button id="btn1" class="btn">prev</button>
    <img src="a1.jpg" alt="" id="im" class="imgwid">
    <button id="btn2" class="btn">next</button>
    <script>
        var imagear = ['a1.jpg', 'a2.jpg', 'a3.jpg', 'a4.jpg', 'a5.jpg', 'a6.jpg', 'a7.jpg', 'a8.jpg', 'a9.jpg'];
        var cnt = 0;
        var im = document.getElementById("im")
        document.getElementById("btn1").addEventListener('click', () => {
            cnt++
            if (cnt == imagear.length - 1) {
                cnt = 0
            }
            im.src = imagear[cnt]
        })
        document.getElementById("btn2").addEventListener('click', () => {
            cnt--
            if (cnt < 0) {
                cnt = imagear.length - 1;
            }
            im.src = imagear[cnt]
        })

    </script>
</body>

</html>
